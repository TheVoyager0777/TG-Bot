<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Phantom Console</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js" defer></script>
<style>
  :root {
    --bg: #131318; --panel: #1b1b22; --panel2: #232330; --card: #1e1e27;
    --fg: #e7e7ec; --dim: #9090a0; --faint: #6b6b78;
    --accent: #8b5cf6; --accent2: #a78bfa; --accent-bg: rgba(139,92,246,.13);
    --ok: #4cc38a; --err: #ef6363; --run: #e2b340; --border: #2d2d3a;
    --mono: "SF Mono", ui-monospace, "Cascadia Code", Consolas, monospace;
    --r: 10px;
  }
  * { box-sizing: border-box; }
  html { scroll-padding-bottom: 140px; }
  body { margin: 0; background: var(--bg); color: var(--fg);
         font: 14px/1.6 -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
         -webkit-font-smoothing: antialiased; }
  /* ── 顶栏 ── */
  header { position: sticky; top: 0; z-index: 9; display: flex; gap: 10px; align-items: center;
           padding: 9px 14px; background: rgba(27,27,34,.92); backdrop-filter: blur(10px);
           border-bottom: 1px solid var(--border); }
  header .logo { font-weight: 700; color: var(--accent2); letter-spacing: .4px; flex: none; }
  header .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--err); flex: none;
                transition: background .3s; }
  header .dot.on { background: var(--ok); }
  #tabs { display: flex; gap: 6px; overflow-x: auto; flex: 1; scrollbar-width: none; }
  #tabs::-webkit-scrollbar { display: none; }
  #tabs button { background: transparent; color: var(--dim); border: 1px solid var(--border);
                 border-radius: 16px; padding: 3px 13px; cursor: pointer; white-space: nowrap;
                 font-size: 12px; display: flex; gap: 6px; align-items: center; transition: all .15s; }
  #tabs button:hover { border-color: var(--accent); color: var(--fg); }
  #tabs button.act { color: #fff; background: var(--accent); border-color: var(--accent); }
  #tabs button .busy { width: 7px; height: 7px; border-radius: 50%; background: var(--run);
                       animation: pulse 1.1s ease-in-out infinite; }
  #tabs button .qn { font-size: 10px; color: var(--run); }
  @keyframes pulse { 50% { opacity: .25; } }
  #todoBtn { background: transparent; color: var(--dim); border: 1px solid var(--border);
             border-radius: 16px; padding: 3px 11px; cursor: pointer; font-size: 12px; display: none; }
  /* ── 主体 ── */
  main { display: grid; grid-template-columns: minmax(0,1fr) 240px; max-width: 1060px; margin: 0 auto; }
  #feed { padding: 18px 20px 150px; overflow-wrap: anywhere; min-width: 0; }
  #side { padding: 16px 14px 150px; border-left: 1px solid var(--border); position: sticky;
          top: 47px; height: calc(100vh - 47px); overflow-y: auto; }
  @media (max-width: 780px) {
    main { grid-template-columns: 1fr; }
    #side { display: none; position: fixed; inset: 47px 0 0 auto; width: min(80vw, 300px);
            background: var(--panel); z-index: 8; border-left: 1px solid var(--border);
            height: auto; box-shadow: -10px 0 34px rgba(0,0,0,.5); }
    #side.open { display: block; }
    #todoBtn { display: block; }
  }
  /* ── 回合组（一问一答，对应 bot 的一个 LiveMessage 生命周期）── */
  .turn { margin: 22px 0; }
  .turn .meta { display: flex; gap: 8px; align-items: center; color: var(--faint);
                font-size: 11px; margin-bottom: 8px; }
  .turn .meta .sess { color: var(--accent2); font-weight: 600; }
  .turn .meta .status { margin-left: auto; }
  .turn .meta .status.run { color: var(--run); animation: pulse 1.4s ease-in-out infinite; }
  .turn .meta .status.done { color: var(--ok); }
  .turn .meta .status.int { color: var(--run); }
  .turn .meta .status.err { color: var(--err); }
  .turn .meta .dur { font-variant-numeric: tabular-nums; }
  /* 用户气泡：右对齐品牌色（Kiro user prompt 卡）*/
  .user { display: flex; justify-content: flex-end; margin: 6px 0 12px; }
  .user .bub { max-width: 86%; background: var(--accent-bg); border: 1px solid
               rgba(139,92,246,.35); border-radius: 14px 14px 4px 14px; padding: 8px 13px;
               white-space: pre-wrap; }
  .user .bub .steer { color: var(--run); font-size: 11px; display: block; margin-bottom: 2px; }
  /* 助手内容：文档流 */
  .txt { white-space: pre-wrap; margin: 8px 0; }
  .txt h1, .txt h2, .txt h3 { font-size: 1.02em; margin: 10px 0 2px; color: var(--accent2); }
  .txt a { color: var(--accent2); }
  .txt code { background: var(--panel2); border-radius: 4px; padding: 1px 5px;
              font-family: var(--mono); font-size: 12.5px; color: var(--accent2); }
  .codewrap { margin: 8px 0; border: 1px solid var(--border); border-radius: var(--r);
              overflow: hidden; }
  .codewrap .codehead { display: flex; justify-content: space-between; align-items: center;
                        background: #1d1d26; border-bottom: 1px solid var(--border);
                        padding: 3px 10px; font-size: 11px; color: var(--faint); }
  .codewrap .codehead .lang { font-family: var(--mono); text-transform: lowercase; }
  .codewrap pre { background: #17171e; padding: 11px 12px; overflow-x: auto;
                  font-family: var(--mono); font-size: 12.5px; line-height: 1.5;
                  white-space: pre; margin: 0; border: none; }
  .codewrap pre code { background: transparent; padding: 0; font-family: inherit;
                       font-size: inherit; color: inherit; display: block; }
  .codewrap .cp { background: var(--panel2); color: var(--dim); border: 1px solid
                  var(--border); border-radius: 6px; font-size: 11px; padding: 1px 9px;
                  cursor: pointer; }
  .codewrap .cp.ok { color: var(--ok); border-color: var(--ok); }
  /* diff 着色（code view：增减行标识）*/
  .dadd { color: #4cc38a; background: rgba(76,195,138,.09); display: inline-block; width: 100%; }
  .ddel { color: #ef6363; background: rgba(239,99,99,.09); display: inline-block; width: 100%; }
  .dhunk { color: var(--accent2); }
  .dmeta { color: var(--faint); }
  /* 工具卡组（连续工具堆成一张卡，原地变态 ◐→✓）*/
  .tools { margin: 8px 0; border: 1px solid var(--border); border-radius: var(--r);
           background: var(--card); overflow: hidden; }
  .tool { display: flex; gap: 9px; align-items: baseline; font-family: var(--mono);
          font-size: 12.5px; padding: 6px 12px; border-bottom: 1px solid rgba(45,45,58,.55); }
  .tool:last-child { border-bottom: none; }
  .tool .ic { width: 15px; text-align: center; flex: none; }
  .tool.running .ic { color: var(--run); animation: spin 1.2s linear infinite; display: inline-block; }
  .tool.completed .ic { color: var(--ok); }
  .tool.error .ic { color: var(--err); }
  .tool.rejected .ic { color: var(--faint); }
  .tool .lb { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tool .sum { color: var(--faint); font-size: 11.5px; margin-left: auto; padding-left: 12px;
               max-width: 42%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
               flex: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 子代理组（对应 bot 的 subagent_pages：独立折叠区）*/
  details.agent { margin: 8px 0; border: 1px dashed var(--border); border-radius: var(--r);
                  background: rgba(30,30,39,.5); padding: 0; }
  details.agent summary { cursor: pointer; list-style: none; user-select: none; color: var(--dim);
                          font-size: 12px; padding: 6px 12px; }
  details.agent summary::-webkit-details-marker { display: none; }
  details.agent summary::before { content: "▸ "; color: var(--faint); }
  details.agent[open] summary::before { content: "▾ "; }
  details.agent .abody { padding: 2px 12px 8px; }
  details.agent .abody .tools { margin: 6px 0; }
  details.agent .abody .txt { font-size: 13px; }
  /* 思考折叠（Kiro reasoning）*/
  details.think { margin: 7px 0; border-left: 2px solid var(--accent); padding-left: 11px; }
  details.think summary { cursor: pointer; color: var(--dim); font-size: 12px; list-style: none;
                          user-select: none; }
  details.think summary::-webkit-details-marker { display: none; }
  details.think summary::before { content: "▸ "; color: var(--faint); }
  details.think[open] summary::before { content: "▾ "; }
  details.think div { color: var(--dim); font-size: 12.5px; margin-top: 5px; white-space: pre-wrap; }
  .note { color: var(--faint); font-size: 12px; margin: 5px 0; }
  /* 结果统计 chips */
  .stats { display: inline-flex; gap: 10px; flex-wrap: wrap; font-size: 11.5px; color: var(--faint);
           background: var(--card); border: 1px solid var(--border); border-radius: 8px;
           padding: 4px 11px; margin-top: 10px; }
  /* ── 侧栏待办 ── */
  #side h3 { font-size: 11px; color: var(--faint); text-transform: uppercase;
             letter-spacing: 1.2px; margin: 4px 0 10px; }
  .todo-sec { color: var(--accent2); font-size: 11px; font-weight: 600; margin: 10px 0 3px; }
  .tprog { height: 4px; background: var(--panel2); border-radius: 2px; margin: 4px 0 8px;
           overflow: hidden; }
  .tprog div { height: 100%; background: var(--accent); border-radius: 2px;
               transition: width .4s; }
  .todo { display: flex; gap: 8px; font-size: 12.5px; padding: 4px 0; align-items: baseline; }
  .todo .ic { width: 14px; flex: none; }
  .todo.completed { color: var(--faint); text-decoration: line-through; }
  .todo.in_progress { color: var(--accent2); font-weight: 600; }
  .todo.in_progress .ic { animation: spin 1.6s linear infinite; display: inline-block; }
  .todo.cancelled { color: var(--faint); text-decoration: line-through; opacity: .55; }
  /* ── 权限审批卡（Kiro 的工具 Allow/Deny 内联卡）── */
  .perm { margin: 8px 0; border: 1px solid rgba(226,179,64,.45); border-radius: var(--r);
          background: rgba(226,179,64,.07); padding: 9px 12px; }
  .perm .ph { font-size: 13px; }
  .perm .ph code { background: var(--panel2); border-radius: 4px; padding: 1px 6px;
                   font-family: var(--mono); font-size: 12px; color: var(--run); }
  .perm pre { font-family: var(--mono); font-size: 12px; color: var(--dim);
              white-space: pre-wrap; margin: 5px 0 9px; max-height: 130px; overflow-y: auto; }
  .perm .btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .perm .btns button { border-radius: 8px; padding: 4px 14px; font-size: 12.5px;
                       cursor: pointer; border: 1px solid var(--border);
                       background: transparent; color: var(--fg); transition: all .15s; }
  .perm .btns .allow { background: var(--accent); border-color: var(--accent); color: #fff; }
  .perm .btns .deny { color: var(--err); border-color: rgba(239,99,99,.5); }
  .perm .btns button:disabled { opacity: .4; cursor: default; }
  .perm.resolved { opacity: .6; border-style: dashed; }
  .perm .verdict { font-size: 12px; color: var(--dim); }
  /* ── 排队消息面板 ── */
  .qrow { font-size: 12px; border: 1px solid var(--border); border-radius: 8px;
          padding: 6px 9px; margin: 6px 0; background: var(--card); }
  .qrow .qs { color: var(--accent2); font-weight: 600; margin-right: 6px; }
  .qrow .qa { display: flex; gap: 6px; margin-top: 6px; }
  .qrow .qa button { font-size: 11.5px; border-radius: 6px; padding: 2px 10px;
                     cursor: pointer; border: 1px solid var(--border);
                     background: transparent; color: var(--dim); }
  .qrow .qa button:hover { color: var(--fg); border-color: var(--accent); }
  /* ── 跟随 / toast / composer ── */
  #jump { position: fixed; right: 18px; bottom: 96px; background: var(--accent); color: #fff;
          border: none; border-radius: 20px; padding: 8px 15px; cursor: pointer; display: none;
          z-index: 7; box-shadow: 0 4px 18px rgba(139,92,246,.4); }
  #toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 108px; z-index: 10;
           background: var(--panel2); border: 1px solid var(--border); color: var(--fg);
           border-radius: 10px; padding: 7px 15px; font-size: 12.5px; display: none; }
  #composer { position: fixed; left: 0; right: 0; bottom: 0; z-index: 9;
              background: linear-gradient(transparent, var(--bg) 26%);
              padding: 18px 12px calc(10px + env(safe-area-inset-bottom)); }
  #composer .inner { max-width: 820px; margin: 0 auto; background: var(--panel);
                     border: 1px solid var(--border); border-radius: 14px; padding: 8px 10px;
                     display: flex; gap: 8px; align-items: flex-end;
                     box-shadow: 0 6px 26px rgba(0,0,0,.35); transition: border-color .15s; }
  #composer .inner:focus-within { border-color: var(--accent); }
  #composer .target { color: var(--accent2); font-size: 11px; flex: none; padding: 0 2px 9px 4px;
                      max-width: 96px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #input { flex: 1; background: transparent; color: var(--fg); border: none;
           padding: 7px 4px; font: inherit; resize: none; max-height: 130px;
           min-height: 36px; outline: none; }
  #stopBtn { background: transparent; color: var(--err); border: 1px solid var(--border);
             border-radius: 10px; padding: 0 12px; height: 34px; cursor: pointer;
             font-size: 13px; flex: none; display: none; }
  #sendBtn { background: var(--accent); color: #fff; border: none; border-radius: 50%;
             width: 34px; height: 34px; cursor: pointer; font-size: 16px; flex: none;
             display: grid; place-items: center; transition: opacity .15s; }
  #sendBtn:disabled { opacity: .35; cursor: default; }
</style>
</head>
<body>
<header>
  <span class="logo">⟁ Phantom Console</span>
  <span class="dot" id="dot"></span>
  <div id="tabs"></div>
  <button id="todoBtn">☰ 待办</button>
</header>
<main>
  <div id="feed"></div>
  <aside id="side">
    <h3>任务清单</h3>
    <div id="todos"><div class="note">暂无</div></div>
    <div id="brainSec" style="display:none">
      <h3 style="margin-top:18px">🧠 副本池</h3>
      <div id="brain"></div>
    </div>
    <div id="queueSec" style="display:none">
      <h3 style="margin-top:18px">排队消息</h3>
      <div id="queue"></div>
    </div>
  </aside>
</main>
<button id="jump">⬇ 跟随</button>
<div id="toast"></div>
<div id="composer">
  <div class="inner">
    <span class="target" id="target">main</span>
    <textarea id="input" rows="1" placeholder="发给当前会话…（Enter 发送，Shift+Enter 换行）"></textarea>
    <button id="stopBtn" title="中断当前回合">✋</button>
    <button id="sendBtn" title="发送">↑</button>
  </div>
</div>
<script>
"use strict";
/* ═══════════════════════════════════════════════════════════════════════
   消息分类（与 bot 的 Claude LLM 会话模式一一对应）：
     user           用户输入（_execute_turn / 桥接 / steer 插话）
     turn_start     一轮开始（LiveMessage 创建）
     text           助手正文段落（流式，段落级增量）
     thinking       思考块（折叠展示）
     tool           工具调用（id 原地变态 running→completed；parent=子代理）
     subagent_text  子代理产出（归入对应子代理折叠组）
     note           系统注记
     todo           任务清单快照（侧栏，按会话分桶）
     result         回合统计（chips）
     turn_end       一轮结束（status: done/interrupted/error）
   渲染模型 = 每会话一台独立状态机（镜像 bot：一个会话一条 LiveMessage 流水线），
   「全部」视图下各会话回合按到达顺序交错排列，互不污染。
   ═══════════════════════════════════════════════════════════════════════ */
const qs = new URLSearchParams(location.search);
const KEY = qs.get("key") || "";
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
const INIT = tg && tg.initData ? tg.initData : "";
const AUTH = KEY ? `key=${KEY}` : `initData=${encodeURIComponent(INIT)}`;

let since = 0, session = null, autoScroll = true;
let epoch = 0, abortCtl = null;   // 切会话时丢弃在途长轮询结果（防 since 回写竞态）
const feed = document.getElementById("feed"), tabs = document.getElementById("tabs");
let stateCache = { sessions: [] };
const $ = id => document.getElementById(id);
const esc = s => s.replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

/* ── 每会话状态机 ──────────────────────────────────────────────────────── */
const S = {};            // session -> 状态
const toolEls = {};      // `${session}/${toolId}` -> 工具行元素
const todosBy = {};      // session -> items[]
const permEls = {};      // `${session}/${token}` -> 待决审批卡
function st(name) {
  return S[name] ??= { turn: null, hasBody: false, lastText: null,
                       tools: null, subs: {}, startTs: 0,
                       durEl: null, statusEl: null };
}
function resetAll() {
  for (const k of Object.keys(S)) delete S[k];
  for (const k of Object.keys(toolEls)) delete toolEls[k];
  for (const k of Object.keys(todosBy)) delete todosBy[k];
  for (const k of Object.keys(permEls)) delete permEls[k];
  feed.innerHTML = "";
  renderTodos();
}

/* ── markdown 渲染（Kiro 子集 + 代码块复制）───────────────────────────── */
function mdInline(s) {
  return s
    .replace(/`([^`\n]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*\n]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<i>$2</i>")
    .replace(/~~([^~\n]+)~~/g, "<s>$1</s>")
    .replace(/\[([^\]\n]+)\]\((https?:[^)\s]+)\)/g,
             '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function md(s) {
  // 捕获围栏语言：split 后 parts = [文本, lang, 代码, 文本, lang, 代码, ...]
  const parts = s.split(/```([\w+#-]*)[^\S\n]*\n?/);
  let out = "";
  for (let i = 0; i < parts.length; i += 3) {
    out += esc(parts[i]).split("\n").map(ln => {
      const h = ln.match(/^(#{1,3})\s+(.*)$/);
      if (h) return `<h${h[1].length}>${mdInline(h[2])}</h${h[1].length}>`;
      const li = ln.match(/^(\s*)[-*]\s+(.*)$/);
      if (li) return li[1] + "• " + mdInline(li[2]);
      return mdInline(ln);
    }).join("\n");
    if (i + 2 < parts.length) {
      const lang = (parts[i + 1] || "").toLowerCase();
      const code = esc((parts[i + 2] || "").replace(/\n$/, ""));
      out += `<div class="codewrap"><div class="codehead">` +
             `<span class="lang">${esc(lang) || "text"}</span>` +
             `<button class="cp">复制</button></div>` +
             `<pre><code class="language-${esc(lang)}">${code}</code></pre></div>`;
    }
  }
  return out;
}
/* ── code view：语法高亮 + diff ± 着色 ─────────────────────────────────── */
const DIFF_RE = /^(@@ |\+\+\+ |--- )/m;
function diffPaint(codeEl) {
  const html = codeEl.textContent.split("\n").map(ln => {
    const e2 = esc(ln) || " ";
    if (/^(\+\+\+|---)\s/.test(ln)) return `<span class="dmeta">${e2}</span>`;
    if (ln.startsWith("@@")) return `<span class="dhunk">${e2}</span>`;
    if (ln.startsWith("+")) return `<span class="dadd">${e2}</span>`;
    if (ln.startsWith("-")) return `<span class="ddel">${e2}</span>`;
    return e2;
  }).join("\n");
  codeEl.innerHTML = html;
}
function highlightUnder(root) {
  if (!root) return;
  root.querySelectorAll("pre code:not(.hl)").forEach(c => {
    c.classList.add("hl");
    const lang = (c.className.match(/language-([\w+#-]+)/) || [])[1] || "";
    if (lang === "diff" || lang === "patch" ||
        (!lang && DIFF_RE.test(c.textContent))) { diffPaint(c); return; }
    if (window.hljs) {
      try {
        if (!lang || hljs.getLanguage(lang)) hljs.highlightElement(c);
      } catch (e) {}
    }
  });
}
feed.addEventListener("click", e => {
  if (!e.target.classList.contains("cp")) return;
  const pre = e.target.closest(".codewrap").querySelector("pre");
  navigator.clipboard.writeText(pre.textContent).then(() => {
    e.target.textContent = "✓ 已复制"; e.target.classList.add("ok");
    setTimeout(() => { e.target.textContent = "复制"; e.target.classList.remove("ok"); }, 1600);
  }).catch(() => toast("复制失败"));
});

/* ── 滚动 / toast ─────────────────────────────────────────────────────── */
const nearBottom = () => innerHeight + scrollY >= document.body.scrollHeight - 170;
const scrollBottom = () => scrollTo(0, document.body.scrollHeight);
addEventListener("scroll", () => {
  if (nearBottom()) { autoScroll = true; $("jump").style.display = "none"; }
  else if (autoScroll) { autoScroll = false; $("jump").style.display = "block"; }
});
$("jump").onclick = () => { autoScroll = true; $("jump").style.display = "none"; scrollBottom(); };
$("todoBtn").onclick = () => $("side").classList.toggle("open");
function toast(msg, ms = 2200) {
  const t = $("toast");
  t.textContent = msg; t.style.display = "block";
  clearTimeout(t._h); t._h = setTimeout(() => t.style.display = "none", ms);
}

/* ── 会话标签 + 状态 ──────────────────────────────────────────────────── */
const busSessions = new Set();
function sessionNames() {
  return [...new Set([...(stateCache.sessions || []).map(s => s.name), ...busSessions])];
}
function pickSession(name) {
  session = name;
  $("target").textContent = name || "main";
  renderTabs();
  resetAll();
  since = 0;   // 重放 backlog
  epoch++;     // 在途请求作废：旧 since 的结果不得回写
  if (abortCtl) { try { abortCtl.abort(); } catch (e) {} }
  updateStopBtn();
  renderQueue();
}
function renderTabs() {
  const names = sessionNames();
  tabs.innerHTML = "";
  const mk = (label, value) => {
    const b = document.createElement("button");
    const stt = (stateCache.sessions || []).find(s => s.name === value);
    b.appendChild(document.createTextNode(label));
    if (stt && stt.busy) { const d = document.createElement("span"); d.className = "busy"; b.appendChild(d); }
    if (stt && stt.queued) { const q = document.createElement("span"); q.className = "qn";
                             q.textContent = "+" + stt.queued; b.appendChild(q); }
    if ((session === null && value === null) || session === value) b.classList.add("act");
    b.onclick = () => pickSession(value);
    tabs.appendChild(b);
  };
  mk("全部", null);
  for (const n of names) mk(n, n);
}
function updateStopBtn() {
  const anyBusy = (stateCache.sessions || []).some(
    s => s.busy && (session === null || s.name === session));
  $("stopBtn").style.display = anyBusy ? "block" : "none";
}
async function refreshState() {
  try {
    const r = await fetch(`/api/state?${AUTH}`);
    if (!r.ok) return;
    stateCache = await r.json();
    renderTabs(); updateStopBtn(); renderQueue();
  } catch (e) {}
}

/* ── 🧠 副本池面板（方案B：active 高亮 + 手动切 active）──────────────────── */
async function refreshBrain() {
  let d;
  try {
    const r = await fetch(`/api/brain?${AUTH}`);
    if (!r.ok) return;
    d = await r.json();
  } catch (e) { return; }
  const sec = $("brainSec"), wrap = $("brain");
  if (!d || d.mode !== "brain") { sec.style.display = "none"; return; }
  sec.style.display = "block";
  wrap.innerHTML = "";
  const head = document.createElement("div");
  head.className = "note";
  head.style.cssText = "display:flex;align-items:center;gap:8px";
  const ht = document.createElement("span");
  ht.textContent = `active: ${(d.active||"无").slice(0,10)} · gen${d.generation||0} · 共 ${(d.replicas||[]).length} 个`;
  head.appendChild(ht);
  const rbtn = document.createElement("button");
  rbtn.textContent = "🔄 刷新";
  rbtn.style.cssText = "font-size:11px;padding:2px 8px";
  rbtn.onclick = async () => {
    rbtn.disabled = true; rbtn.textContent = "⏳ 刷新中…";
    try { await fetch(`/api/brain/refresh?${AUTH}`, {method:"POST"}); } catch(e){}
    await refreshBrain();
    rbtn.disabled = false; rbtn.textContent = "🔄 刷新";
  };
  head.appendChild(rbtn);
  wrap.appendChild(head);
  for (const r of (d.replicas || [])) {
    const row = document.createElement("div");
    row.className = "qrow";
    const flag = r.active ? "🟢" : (r.alive ? "⚪" : "💤");
    const label = document.createElement("div");
    label.textContent = `${flag} ${r.composer.slice(0,10)} · ws=${r.workspace||"?"} · ${r.age}s`;
    row.appendChild(label);
    if (!r.active && r.alive) {
      const acts = document.createElement("div");
      acts.className = "qa";
      const b = document.createElement("button");
      b.textContent = "▶ 设为 active";
      b.onclick = async () => {
        try {
          const rr = await fetch(`/api/brain/active?${AUTH}`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ composer: r.composer }) });
          const jj = await rr.json();
          toast(jj.toast || (jj.ok ? "已切换" : "切换失败"));
          refreshBrain();
        } catch (e) { toast("切换请求失败"); }
      };
      acts.appendChild(b);
      row.appendChild(acts);
    }
    wrap.appendChild(row);
  }
}

/* ── 排队消息面板（插话 / 取消，对应 TG 排队按钮）─────────────────────── */
function renderQueue() {
  const sec = $("queueSec"), wrap = $("queue");
  wrap.innerHTML = "";
  let any = false;
  for (const s of stateCache.sessions || []) {
    if (session !== null && s.name !== session) continue;
    for (const q of s.queue || []) {
      any = true;
      const row = document.createElement("div");
      row.className = "qrow";
      const head = document.createElement("div");
      const sess = document.createElement("span");
      sess.className = "qs"; sess.textContent = s.name;
      head.appendChild(sess);
      head.appendChild(document.createTextNode(q.preview));
      row.appendChild(head);
      const acts = document.createElement("div");
      acts.className = "qa";
      for (const [label, action] of [["⚡ 插话", "steer"], ["✕ 取消", "cancel"]]) {
        const b = document.createElement("button");
        b.textContent = label;
        b.onclick = async () => {
          try {
            const r = await fetch(`/api/queue?${AUTH}`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token: q.token, action }),
            });
            const j = await r.json().catch(() => ({}));
            toast(j.toast || "已处理");
          } catch (e) { toast("操作失败：" + e); }
          refreshState();
        };
        acts.appendChild(b);
      }
      row.appendChild(acts);
      wrap.appendChild(row);
    }
  }
  sec.style.display = any ? "block" : "none";
}

/* ── 回合容器（每会话）────────────────────────────────────────────────── */
function newTurn(s, ev) {
  const t = document.createElement("div");
  t.className = "turn";
  const m = document.createElement("div");
  m.className = "meta";
  m.innerHTML = `<span class="sess"></span><span></span>` +
                `<span class="status run">● working…</span><span class="dur"></span>`;
  m.children[0].textContent = ev.session;
  m.children[1].textContent = new Date(ev.ts * 1000).toLocaleTimeString();
  t.appendChild(m);
  feed.appendChild(t);
  s.turn = t; s.hasBody = false; s.lastText = null; s.tools = null; s.subs = {};
  s.startTs = ev.ts; s.statusEl = m.children[2]; s.durEl = m.children[3];
}
function ensureTurn(s, ev) { if (!s.turn) newTurn(s, ev); return s.turn; }
// live 回合每秒走字
setInterval(() => {
  for (const s of Object.values(S))
    if (s.turn && s.statusEl && s.statusEl.classList.contains("run") && s.durEl)
      s.durEl.textContent = `⏱ ${Math.max(0, Date.now() / 1000 - s.startTs).toFixed(0)}s`;
}, 1000);

const ICONS = { running: "◐", completed: "✓", error: "✗", rejected: "⊘" };
const ST_LABEL = { done: ["done", "✓ 完成"], interrupted: ["int", "⊘ 中断"],
                   error: ["err", "✗ 出错"], running: ["run", "● working…"] };

function subBox(s, ev, parent) {
  // 子代理折叠组（对应 bot 的 subagent_pages）
  let sub = s.subs[parent];
  if (!sub) {
    const d = document.createElement("details");
    d.className = "agent";
    d.innerHTML = `<summary>⚡ 子代理 #${esc(parent)}</summary><div class="abody"></div>`;
    ensureTurn(s, ev).appendChild(d);
    sub = s.subs[parent] = { body: d.querySelector(".abody"), lastText: null, tools: null };
  }
  return sub;
}

/* ── 事件分派 ─────────────────────────────────────────────────────────── */
function handle(ev) {
  if (session !== null && ev.session !== session) return;
  const s = st(ev.session);
  switch (ev.type) {
    case "user": {
      // steer 插话进当前 live 回合；普通消息开新回合组
      if (!(ev.steer && s.turn)) {
        if (!(s.turn && !s.hasBody)) newTurn(s, ev);
      }
      const w = document.createElement("div");
      w.className = "user";
      const b = document.createElement("div");
      b.className = "bub";
      if (ev.steer) b.innerHTML = `<span class="steer">⚡ 插话</span>`;
      b.appendChild(document.createTextNode(ev.text || ""));
      w.appendChild(b);
      ensureTurn(s, ev).appendChild(w);
      break; }
    case "turn_start": {
      // user 事件刚开的组（只有用户气泡）直接复用，否则开新组
      if (!(s.turn && !s.hasBody)) newTurn(s, ev);
      break; }
    case "text": {
      ensureTurn(s, ev); s.hasBody = true;
      if (!s.lastText) {
        s.lastText = document.createElement("div");
        s.lastText.className = "txt"; s.lastText.dataset.raw = "";
        s.turn.appendChild(s.lastText);
      }
      s.lastText.dataset.raw += (s.lastText.dataset.raw ? "\n\n" : "") + ev.text;
      s.lastText.innerHTML = md(s.lastText.dataset.raw);
      highlightUnder(s.lastText);
      s.tools = null;
      break; }
    case "tool": {
      ensureTurn(s, ev); s.hasBody = true;
      s.lastText = null;
      const key = ev.session + "/" + ev.id;
      let el = toolEls[key];
      if (!el) {
        el = document.createElement("div");
        el.innerHTML = `<span class="ic"></span><span class="lb"></span><span class="sum"></span>`;
        toolEls[key] = el;
        if (ev.parent) {
          const sub = subBox(s, ev, ev.parent);
          if (!sub.tools) { sub.tools = document.createElement("div");
                            sub.tools.className = "tools"; sub.body.appendChild(sub.tools); }
          sub.tools.appendChild(el);
        } else {
          if (!s.tools) { s.tools = document.createElement("div");
                          s.tools.className = "tools"; s.turn.appendChild(s.tools); }
          s.tools.appendChild(el);
        }
      }
      el.className = "tool " + (ev.phase || "running");
      el.querySelector(".ic").textContent = ICONS[ev.phase] || "◐";
      el.querySelector(".lb").textContent = ev.label || "tool";
      el.querySelector(".sum").textContent = ev.summary || "";
      break; }
    case "subagent_text": {
      ensureTurn(s, ev); s.hasBody = true;
      const sub = subBox(s, ev, ev.parent || "?");
      if (!sub.lastText) {
        sub.lastText = document.createElement("div");
        sub.lastText.className = "txt"; sub.lastText.dataset.raw = "";
        sub.body.appendChild(sub.lastText);
      }
      sub.lastText.dataset.raw += (sub.lastText.dataset.raw ? "\n\n" : "") + ev.text;
      sub.lastText.innerHTML = md(sub.lastText.dataset.raw);
      highlightUnder(sub.lastText);
      sub.tools = null;
      break; }
    case "thinking": {
      ensureTurn(s, ev); s.hasBody = true;
      s.lastText = null; s.tools = null;
      const d = document.createElement("details");
      d.className = "think";
      const head = (ev.text || "").split("\n")[0].slice(0, 60);
      d.innerHTML = `<summary>思考 · <span></span></summary><div></div>`;
      d.querySelector("summary span").textContent = head + "…";
      d.querySelector("div").textContent = ev.text;
      s.turn.appendChild(d);
      break; }
    case "note": {
      const n = document.createElement("div");
      n.className = "note"; n.textContent = "ℹ " + ev.text;
      ensureTurn(s, ev).appendChild(n);
      break; }
    case "todo": {
      todosBy[ev.session] = ev.items || [];
      renderTodos();
      break; }
    case "perm": {
      // 工具权限闸：Allow/Deny 内联卡（与 TG 按钮双通道，谁先点谁生效）
      ensureTurn(s, ev); s.hasBody = true;
      const card = document.createElement("div");
      card.className = "perm";
      card.innerHTML = `<div class="ph">🔐 请求工具 <code></code></div><pre></pre>` +
        `<div class="btns"><button class="allow">✅ 允许</button>` +
        `<button class="always">♾ 总是允许</button>` +
        `<button class="deny">⛔ 拒绝</button></div>`;
      card.querySelector("code").textContent = ev.tool || "?";
      card.querySelector("pre").textContent = ev.preview || "";
      for (const [cls, decision] of [["allow", "allow"], ["always", "always"], ["deny", "deny"]]) {
        card.querySelector("." + cls).onclick = async (e2) => {
          card.querySelectorAll("button").forEach(b => b.disabled = true);
          try {
            const r = await fetch(`/api/perm?${AUTH}`, {
              method: "POST", headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token: ev.token, decision }),
            });
            const j = await r.json().catch(() => ({}));
            if (!j.ok) { toast("该审批已被处理或过期");
                         card.querySelectorAll("button").forEach(b => b.disabled = false); }
            if (tg) { try { tg.HapticFeedback.impactOccurred("medium"); } catch (e3) {} }
          } catch (e2) { toast("操作失败：" + e2);
                         card.querySelectorAll("button").forEach(b => b.disabled = false); }
        };
      }
      permEls[ev.session + "/" + ev.token] = card;
      s.turn.appendChild(card);
      break; }
    case "perm_done": {
      const card = permEls[ev.session + "/" + ev.token];
      if (card) {
        const verdict = { allow: "✅ 已允许", always: "♾ 已永久允许",
                          deny: "⛔ 已拒绝", timeout: "⌛ 超时自动拒绝" }[ev.decision] || ev.decision;
        const btns = card.querySelector(".btns");
        if (btns) { const v = document.createElement("span");
                    v.className = "verdict"; v.textContent = verdict;
                    btns.replaceWith(v); }
        card.classList.add("resolved");
        delete permEls[ev.session + "/" + ev.token];
      }
      break; }
    case "result": {
      ensureTurn(s, ev); s.hasBody = true;
      const box = document.createElement("div");
      box.className = "stats";
      for (const part of (ev.stats || "").split("·")) {
        const sp = document.createElement("span"); sp.textContent = part.trim();
        box.appendChild(sp);
      }
      s.turn.appendChild(box);
      break; }
    case "turn_end": {
      if (s.turn) {
        const [cls, label] = ST_LABEL[ev.status] || ST_LABEL.done;
        if (s.statusEl) { s.statusEl.className = "status " + cls; s.statusEl.textContent = label; }
        if (s.durEl && s.startTs)
          s.durEl.textContent = `⏱ ${Math.max(0, ev.ts - s.startTs).toFixed(0)}s`;
      }
      s.turn = null; s.hasBody = false; s.lastText = null; s.tools = null; s.subs = {};
      refreshState();
      break; }
  }
}

/* ── 侧栏待办（按会话分桶；选了会话只看该会话）────────────────────────── */
function renderTodos() {
  const wrap = $("todos");
  wrap.innerHTML = "";
  const names = session === null ? Object.keys(todosBy) : [session];
  let any = false;
  for (const name of names) {
    const items = todosBy[name] || [];
    if (!items.length) continue;
    any = true;
    if (session === null && Object.keys(todosBy).length > 1) {
      const h = document.createElement("div");
      h.className = "todo-sec"; h.textContent = name;
      wrap.appendChild(h);
    }
    const done = items.filter(t => t.status === "completed").length;
    const prog = document.createElement("div");
    prog.className = "tprog";
    prog.innerHTML = `<div style="width:${done / items.length * 100}%"></div>`;
    wrap.appendChild(prog);
    for (const t of items) {
      const r = document.createElement("div");
      r.className = "todo " + t.status;
      const ic = t.status === "completed" ? "✓" : t.status === "in_progress" ? "◐" :
                 (t.status === "cancelled" || t.status === "canceled") ? "⊘" : "○";
      r.innerHTML = `<span class="ic">${ic}</span><span></span>`;
      r.querySelector("span:last-child").textContent = t.text;
      wrap.appendChild(r);
    }
  }
  if (!any) wrap.innerHTML = `<div class="note">暂无</div>`;
}

/* ── 发送 / 中断 ──────────────────────────────────────────────────────── */
const input = $("input");
function fit() { input.style.height = "auto"; input.style.height = Math.min(input.scrollHeight, 130) + "px"; }
input.addEventListener("input", fit);
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); doSend(); }
});
$("sendBtn").onclick = doSend;
async function doSend() {
  const text = input.value.trim();
  if (!text) return;
  $("sendBtn").disabled = true;
  try {
    const r = await fetch(`/api/send?${AUTH}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session: session || "main", text }),
    });
    const j = await r.json().catch(() => ({}));
    if (!r.ok) { toast("发送失败：" + (j.error || r.status)); }
    else {
      input.value = ""; fit();
      if (j.status === "queued") toast("📥 会话忙，已排队");
      if (tg) { try { tg.HapticFeedback.impactOccurred("light"); } catch (e) {} }
      refreshState();
    }
  } catch (e) { toast("发送失败：" + e); }
  $("sendBtn").disabled = false;
}
$("stopBtn").onclick = async () => {
  try {
    const r = await fetch(`/api/stop?${AUTH}`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session: session || "" }),
    });
    const j = await r.json().catch(() => ({}));
    toast((j.stopped || []).length ? "✋ 已中断 " + j.stopped.join(", ") : "没有在跑的回合");
    refreshState();
  } catch (e) { toast("中断失败：" + e); }
};

/* ── 主循环（长轮询）─────────────────────────────────────────────────── */
async function loop() {
  const dot = $("dot");
  for (;;) {
    const myEpoch = epoch;
    try {
      abortCtl = new AbortController();
      const r = await fetch(`/api/events?since=${since}&wait=1&${AUTH}`,
                            { signal: abortCtl.signal });
      if (myEpoch !== epoch) continue;   // 切了会话：本轮结果作废，立刻按新 since 重拉
      if (r.status === 403) {
        dot.classList.remove("on");
        toast(KEY || INIT ? "鉴权失败：key 失效或非 owner 账号"
                          : "缺凭据：请从 bot 的 /console 按钮打开", 8000);
        await new Promise(res => setTimeout(res, 10000));
        continue;
      }
      if (!r.ok) throw new Error(r.status);
      dot.classList.add("on");
      const j = await r.json();
      if (myEpoch !== epoch) continue;
      let newSess = false;
      for (const n of j.sessions || [])
        if (!busSessions.has(n)) { busSessions.add(n); newSess = true; }
      if (newSess) renderTabs();
      for (const ev of j.events || []) { handle(ev); since = Math.max(since, ev.seq); }
      if ((j.events || []).length && autoScroll) scrollBottom();
    } catch (e) {
      if (myEpoch !== epoch) continue;   // abort 导致的异常：直接重拉
      dot.classList.remove("on");
      await new Promise(res => setTimeout(res, 3000));
    }
  }
}
refreshState();
refreshBrain();
setInterval(refreshState, 15000);
setInterval(refreshBrain, 4000);
loop();
</script>
